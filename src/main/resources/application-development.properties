spring.application.name=demo

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:demo}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.auth.access-token-days=${ACCESS_TOKEN_DAYS:3}
app.auth.refresh-token-days=${REFRESH_TOKEN_DAYS:7}
app.upload.student-photos-dir=${STUDENT_PHOTOS_DIR:/app/uploads/student-photos}
app.reservation-report-service.url=${RESERVATION_REPORT_SERVICE_URL:http://localhost:8081}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
